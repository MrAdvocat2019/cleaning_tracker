<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#FAF9F5" />
  <title>Уборка</title>
  <style>
    :root {
      --bg: #FAF9F5;
      --surface: #FFFFFF;
      --border: #E8E4DA;
      --text: #3D3929;
      --text-secondary: #6B6557;
      --text-muted: #9A9485;
      --accent: #D97757;
      --accent-soft: #F5E6DD;
      --radius: 12px;
      --serif: Georgia, "Times New Roman", serif;
      --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      font-size: 16px;
      line-height: 1.4;
      -webkit-font-smoothing: antialiased;
    }

    body {
      height: 100vh;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      padding-top: env(safe-area-inset-top);
    }

    /* Вкладки */
    .tabs {
      display: flex;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      flex: 0 0 auto;
    }
    .tab-btn {
      flex: 1;
      background: transparent;
      border: 0;
      color: var(--text-secondary);
      font-family: var(--sans);
      font-size: 15px;
      padding: 14px 0;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      transition: color 120ms ease, border-color 120ms ease;
    }
    .tab-btn.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }

    /* Контейнер вкладки */
    .view {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
    }
    .view.hidden { display: none; }

    /* === Вкладка "Уборка" === */

    /* Полоска дней */
    .days {
      display: flex;
      gap: 6px;
      padding: 12px 16px;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      flex: 0 0 auto;
    }
    .day {
      flex: 1;
      min-width: 0;
      height: 56px;
      border: 1px solid var(--border);
      background: var(--surface);
      border-radius: var(--radius);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
      cursor: pointer;
      transition: background 120ms ease, border-color 120ms ease, color 120ms ease;
      color: var(--text-secondary);
      font-family: var(--sans);
      padding: 0;
    }
    .day .day-name {
      font-size: 12px;
      letter-spacing: 0.02em;
      text-transform: uppercase;
    }
    .day .day-date {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
    }
    .day.today { border-color: var(--accent); }
    .day.done {
      background: var(--accent-soft);
      border-color: var(--accent-soft);
      color: var(--text);
    }
    .day.done .day-date { color: var(--text); }
    .day.selected {
      background: var(--accent);
      border-color: var(--accent);
      color: #FFFFFF;
    }
    .day.selected .day-date,
    .day.selected .day-name { color: #FFFFFF; }

    main {
      flex: 1;
      padding: 16px;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    .day-header { margin: 4px 0 16px; }
    .day-header .eyebrow {
      font-size: 13px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .day-header h1 {
      font-family: var(--serif);
      font-weight: 400;
      font-size: 28px;
      line-height: 1.15;
      margin: 4px 0 0;
      color: var(--text);
    }

    .tasks { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }
    .task {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      cursor: pointer;
      user-select: none;
      min-height: 56px;
      transition: background 120ms ease, border-color 120ms ease;
    }
    .task .checkbox {
      flex: 0 0 22px;
      width: 22px;
      height: 22px;
      border-radius: 6px;
      border: 1.5px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 120ms ease, border-color 120ms ease;
    }
    .task .checkbox svg { width: 14px; height: 14px; opacity: 0; transition: opacity 120ms ease; }
    .task .label { flex: 1; font-size: 16px; color: var(--text); }
    .task.done { background: transparent; }
    .task.done .checkbox { background: var(--accent); border-color: var(--accent); }
    .task.done .checkbox svg { opacity: 1; }
    .task.done .label { color: var(--text-muted); text-decoration: line-through; }

    .progress { display: flex; align-items: center; gap: 12px; margin-bottom: 28px; padding: 0 4px; }
    .progress .bar { flex: 1; height: 4px; background: var(--border); border-radius: 999px; overflow: hidden; }
    .progress .bar > span { display: block; height: 100%; background: var(--accent); transition: width 220ms ease; }
    .progress .label { font-size: 13px; color: var(--text-secondary); white-space: nowrap; }

    .empty-note {
      padding: 24px 12px;
      text-align: center;
      color: var(--text-muted);
      font-size: 14px;
    }

    .monthly {
      border-top: 1px solid var(--border);
      background: var(--bg);
      padding: 14px 16px calc(14px + env(safe-area-inset-bottom));
      flex: 0 0 auto;
    }
    .monthly h2 {
      margin: 0 0 10px;
      font-family: var(--serif);
      font-weight: 400;
      font-size: 14px;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .monthly-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 6px;
      max-height: 38vh;
      overflow-y: auto;
    }
    .monthly-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      cursor: pointer;
      min-height: 44px;
      font-size: 14px;
      color: var(--text);
    }
    .monthly-item .checkbox {
      flex: 0 0 18px;
      width: 18px;
      height: 18px;
      border-radius: 5px;
      border: 1.5px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .monthly-item .checkbox svg { width: 11px; height: 11px; opacity: 0; }
    .monthly-item.done .checkbox { background: var(--accent); border-color: var(--accent); }
    .monthly-item.done .checkbox svg { opacity: 1; }
    .monthly-item.done .label { color: var(--text-muted); text-decoration: line-through; }

    /* === Вкладка "Задачи" (редактор) === */
    .view-editor {
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 16px 16px calc(16px + env(safe-area-inset-bottom));
    }
    .editor-section { margin-bottom: 24px; }
    .editor-section > h2 {
      font-family: var(--serif);
      font-weight: 400;
      font-size: 14px;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin: 0 0 10px;
    }
    .day-block {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px;
      margin-bottom: 10px;
    }
    .day-block-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
    }
    .day-tag {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-muted);
      flex: 0 0 auto;
      padding: 0 6px;
    }
    .text-input {
      flex: 1;
      min-width: 0;
      border: 1px solid transparent;
      background: transparent;
      border-radius: 8px;
      padding: 10px;
      font-family: var(--sans);
      font-size: 15px;
      color: var(--text);
      -webkit-appearance: none;
      appearance: none;
    }
    .text-input::placeholder { color: var(--text-muted); }
    .text-input:focus {
      outline: none;
      background: var(--bg);
      border-color: var(--border);
    }
    .day-title-input {
      font-family: var(--serif);
      font-size: 18px;
      padding: 6px 10px;
    }
    .item-row {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .icon-btn {
      flex: 0 0 36px;
      height: 36px;
      width: 36px;
      border-radius: 8px;
      border: 0;
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      line-height: 1;
      padding: 0;
    }
    .icon-btn:active { background: var(--accent-soft); color: var(--accent); }
    .add-row { padding-top: 4px; }
    .add-btn {
      background: transparent;
      border: 0;
      color: var(--accent);
      font-family: var(--sans);
      font-size: 14px;
      padding: 8px 10px;
      cursor: pointer;
      border-radius: 8px;
    }
    .add-btn:active { background: var(--accent-soft); }
    .monthly-block {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 6px;
    }
    .reset-btn {
      display: block;
      width: 100%;
      margin-top: 8px;
      padding: 12px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text-secondary);
      font-family: var(--sans);
      font-size: 14px;
      cursor: pointer;
    }
    .reset-btn:active { background: var(--bg); color: var(--accent); border-color: var(--accent); }

    @media (min-width: 600px) {
      .tabs, .days, main, .monthly, .view-editor { max-width: 640px; margin-left: auto; margin-right: auto; width: 100%; }
      .monthly-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    }
  </style>
</head>
<body>
  <nav class="tabs" id="tabs" aria-label="Вкладки">
    <button type="button" class="tab-btn active" data-view="cleaning">Уборка</button>
    <button type="button" class="tab-btn" data-view="editor">Задачи</button>
  </nav>

  <div class="view view-cleaning" id="view-cleaning">
    <nav class="days" id="days" aria-label="Дни недели"></nav>
    <main>
      <header class="day-header">
        <div class="eyebrow" id="day-eyebrow"></div>
        <h1 id="day-title"></h1>
      </header>
      <div class="tasks" id="tasks"></div>
      <div class="progress">
        <div class="bar"><span id="progress-fill" style="width: 0%"></span></div>
        <div class="label" id="progress-label">0 из 0</div>
      </div>
    </main>
    <section class="monthly" aria-label="Раз в месяц">
      <h2>Раз в месяц</h2>
      <div class="monthly-grid" id="monthly"></div>
    </section>
  </div>

  <div class="view view-editor hidden" id="view-editor">
    <div class="editor-section">
      <h2>Дни недели</h2>
      <div id="editor-weekly"></div>
    </div>
    <div class="editor-section">
      <h2>Раз в месяц</h2>
      <div class="monthly-block" id="editor-monthly"></div>
      <div class="add-row"><button type="button" class="add-btn" id="add-monthly">+ Добавить</button></div>
    </div>
    <button type="button" class="reset-btn" id="reset-defaults">Сбросить задачи к стандартным</button>
  </div>

  <script src="tasks.js"></script>
  <script>
    (function () {
      const PROGRESS_KEY = "cleaning-tracker-v1";
      const TASKS_KEY = "cleaning-tracker-tasks-v1";
      const DAY_KEYS = ["Mon", "Tue", "Wed", "Thu", "Fri", "Sat", "Sun"];
      const DAY_LABELS_SHORT = { Mon: "Пн", Tue: "Вт", Wed: "Ср", Thu: "Чт", Fri: "Пт", Sat: "Сб", Sun: "Вс" };
      const DAY_LABELS_LONG = { Mon: "Понедельник", Tue: "Вторник", Wed: "Среда", Thu: "Четверг", Fri: "Пятница", Sat: "Суббота", Sun: "Воскресенье" };

      // --- Даты / ключи периода ---
      function getISOWeekKey(date) {
        const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
        const dayNum = d.getUTCDay() || 7;
        d.setUTCDate(d.getUTCDate() + 4 - dayNum);
        const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
        const weekNum = Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
        return `${d.getUTCFullYear()}-W${String(weekNum).padStart(2, "0")}`;
      }
      function getMonthKey(date) {
        return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, "0")}`;
      }
      function getDayKey(date) {
        const js = date.getDay();
        return DAY_KEYS[(js + 6) % 7];
      }
      function getMondayOfWeek(date) {
        const d = new Date(date);
        const js = d.getDay();
        const offset = (js + 6) % 7;
        d.setDate(d.getDate() - offset);
        d.setHours(0, 0, 0, 0);
        return d;
      }

      // --- Прогресс в localStorage ---
      function loadProgress() {
        try {
          const raw = localStorage.getItem(PROGRESS_KEY);
          if (!raw) return { weekKey: "", monthKey: "", daily: {}, monthly: {} };
          const p = JSON.parse(raw);
          return {
            weekKey: p.weekKey || "",
            monthKey: p.monthKey || "",
            daily: p.daily || {},
            monthly: p.monthly || {},
          };
        } catch (e) {
          return { weekKey: "", monthKey: "", daily: {}, monthly: {} };
        }
      }
      function saveProgress() {
        localStorage.setItem(PROGRESS_KEY, JSON.stringify(progress));
      }

      // --- Задачи: дефолты + пользовательские ---
      function defaultTasks() {
        return {
          weekly: JSON.parse(JSON.stringify(WEEKLY_TASKS)),
          monthly: MONTHLY_TASKS.slice(),
        };
      }
      function loadCustomTasks() {
        try {
          const raw = localStorage.getItem(TASKS_KEY);
          if (!raw) return null;
          const p = JSON.parse(raw);
          if (!p || !p.weekly || !Array.isArray(p.monthly)) return null;
          // Гарантируем наличие всех дней
          const merged = defaultTasks();
          DAY_KEYS.forEach((k) => {
            if (p.weekly[k] && Array.isArray(p.weekly[k].items)) {
              merged.weekly[k] = {
                title: typeof p.weekly[k].title === "string" ? p.weekly[k].title : merged.weekly[k].title,
                items: p.weekly[k].items.slice(),
              };
            }
          });
          merged.monthly = p.monthly.slice();
          return merged;
        } catch (e) {
          return null;
        }
      }
      function saveTasks() {
        localStorage.setItem(TASKS_KEY, JSON.stringify(tasks));
      }
      function clearCustomTasks() {
        localStorage.removeItem(TASKS_KEY);
      }

      // --- Состояние ---
      const now = new Date();
      const currentWeekKey = getISOWeekKey(now);
      const currentMonthKey = getMonthKey(now);
      const todayKey = getDayKey(now);
      const monday = getMondayOfWeek(now);

      const progress = loadProgress();
      if (progress.weekKey !== currentWeekKey) {
        progress.weekKey = currentWeekKey;
        progress.daily = {};
      }
      if (progress.monthKey !== currentMonthKey) {
        progress.monthKey = currentMonthKey;
        progress.monthly = {};
      }
      saveProgress();

      let tasks = loadCustomTasks() || defaultTasks();
      let selectedDay = todayKey;

      // --- Общее ---
      function checkSvg() {
        return `<svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><path d="M4 10.5L8 14.5L16 6.5" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
      }

      // === Вкладка "Уборка" ===
      const daysEl = document.getElementById("days");
      const eyebrowEl = document.getElementById("day-eyebrow");
      const titleEl = document.getElementById("day-title");
      const tasksEl = document.getElementById("tasks");
      const progressFill = document.getElementById("progress-fill");
      const progressLabel = document.getElementById("progress-label");
      const monthlyEl = document.getElementById("monthly");

      function renderDays() {
        daysEl.innerHTML = "";
        DAY_KEYS.forEach((key, i) => {
          const date = new Date(monday);
          date.setDate(monday.getDate() + i);
          const btn = document.createElement("button");
          btn.type = "button";
          btn.className = "day";
          if (key === todayKey) btn.classList.add("today");
          if (key === selectedDay) btn.classList.add("selected");
          const dayItems = (tasks.weekly[key] && tasks.weekly[key].items) || [];
          const allDone = dayItems.length > 0 && dayItems.every((_, idx) => progress.daily[`${key}-${idx}`]);
          if (allDone) btn.classList.add("done");
          btn.innerHTML = `<span class="day-name">${DAY_LABELS_SHORT[key]}</span><span class="day-date">${date.getDate()}</span>`;
          btn.addEventListener("click", () => {
            selectedDay = key;
            renderDays();
            renderTasks();
          });
          daysEl.appendChild(btn);
        });
      }

      function renderTasks() {
        const day = tasks.weekly[selectedDay];
        eyebrowEl.textContent = DAY_LABELS_LONG[selectedDay] || "";
        titleEl.textContent = (day && day.title) || "Без названия";
        tasksEl.innerHTML = "";

        const items = (day && day.items) || [];
        if (items.length === 0) {
          const empty = document.createElement("div");
          empty.className = "empty-note";
          empty.textContent = "Нет задач на этот день. Добавь их во вкладке «Задачи».";
          tasksEl.appendChild(empty);
        } else {
          items.forEach((text, idx) => {
            if (!text || !text.trim()) return;
            const id = `${selectedDay}-${idx}`;
            const done = !!progress.daily[id];
            const item = document.createElement("div");
            item.className = "task" + (done ? " done" : "");
            item.setAttribute("role", "button");
            item.setAttribute("tabindex", "0");
            item.innerHTML = `<div class="checkbox">${checkSvg()}</div><div class="label"></div>`;
            item.querySelector(".label").textContent = text;
            const toggle = () => {
              progress.daily[id] = !progress.daily[id];
              if (!progress.daily[id]) delete progress.daily[id];
              saveProgress();
              renderTasks();
              renderDays();
            };
            item.addEventListener("click", toggle);
            item.addEventListener("keydown", (e) => {
              if (e.key === " " || e.key === "Enter") { e.preventDefault(); toggle(); }
            });
            tasksEl.appendChild(item);
          });
        }

        const visibleItems = items.filter((t) => t && t.trim());
        const total = visibleItems.length;
        const doneCount = items.reduce((acc, t, idx) => acc + (t && t.trim() && progress.daily[`${selectedDay}-${idx}`] ? 1 : 0), 0);
        progressFill.style.width = total ? `${(doneCount / total) * 100}%` : "0%";
        progressLabel.textContent = `${doneCount} из ${total}`;
      }

      function renderMonthly() {
        monthlyEl.innerHTML = "";
        tasks.monthly.forEach((text, idx) => {
          if (!text || !text.trim()) return;
          const id = `m-${idx}`;
          const done = !!progress.monthly[id];
          const item = document.createElement("div");
          item.className = "monthly-item" + (done ? " done" : "");
          item.setAttribute("role", "button");
          item.setAttribute("tabindex", "0");
          item.innerHTML = `<div class="checkbox">${checkSvg()}</div><div class="label"></div>`;
          item.querySelector(".label").textContent = text;
          const toggle = () => {
            progress.monthly[id] = !progress.monthly[id];
            if (!progress.monthly[id]) delete progress.monthly[id];
            saveProgress();
            renderMonthly();
          };
          item.addEventListener("click", toggle);
          item.addEventListener("keydown", (e) => {
            if (e.key === " " || e.key === "Enter") { e.preventDefault(); toggle(); }
          });
          monthlyEl.appendChild(item);
        });
      }

      // === Вкладка "Задачи" (редактор) ===
      const editorWeeklyEl = document.getElementById("editor-weekly");
      const editorMonthlyEl = document.getElementById("editor-monthly");
      const addMonthlyBtn = document.getElementById("add-monthly");
      const resetBtn = document.getElementById("reset-defaults");

      function makeItemRow(getValue, setValue, onDelete, placeholder) {
        const row = document.createElement("div");
        row.className = "item-row";
        row.innerHTML = `<input type="text" class="text-input" /><button type="button" class="icon-btn" aria-label="Удалить">×</button>`;
        const input = row.querySelector(".text-input");
        input.value = getValue();
        input.placeholder = placeholder || "";
        input.addEventListener("input", () => { setValue(input.value); saveTasks(); });
        row.querySelector(".icon-btn").addEventListener("click", onDelete);
        return { row, input };
      }

      function renderEditor() {
        // Дни
        editorWeeklyEl.innerHTML = "";
        DAY_KEYS.forEach((key) => {
          if (!tasks.weekly[key]) tasks.weekly[key] = { title: "", items: [] };
          const day = tasks.weekly[key];

          const block = document.createElement("div");
          block.className = "day-block";
          block.innerHTML = `
            <div class="day-block-header">
              <div class="day-tag"></div>
              <input type="text" class="text-input day-title-input" />
            </div>
            <div class="items"></div>
            <div class="add-row"><button type="button" class="add-btn">+ Добавить задачу</button></div>
          `;
          block.querySelector(".day-tag").textContent = DAY_LABELS_SHORT[key];
          const titleInput = block.querySelector(".day-title-input");
          titleInput.value = day.title;
          titleInput.placeholder = "Название дня";
          titleInput.addEventListener("input", () => { day.title = titleInput.value; saveTasks(); });

          const itemsContainer = block.querySelector(".items");
          function renderItems() {
            itemsContainer.innerHTML = "";
            day.items.forEach((_, idx) => {
              const { row } = makeItemRow(
                () => day.items[idx],
                (v) => { day.items[idx] = v; },
                () => { day.items.splice(idx, 1); saveTasks(); renderItems(); },
                "Текст задачи"
              );
              itemsContainer.appendChild(row);
            });
          }
          renderItems();

          block.querySelector(".add-btn").addEventListener("click", () => {
            day.items.push("");
            saveTasks();
            renderItems();
            const inputs = itemsContainer.querySelectorAll(".text-input");
            if (inputs.length) inputs[inputs.length - 1].focus();
          });

          editorWeeklyEl.appendChild(block);
        });

        renderMonthlyEditor();
      }

      function renderMonthlyEditor() {
        editorMonthlyEl.innerHTML = "";
        tasks.monthly.forEach((_, idx) => {
          const { row } = makeItemRow(
            () => tasks.monthly[idx],
            (v) => { tasks.monthly[idx] = v; },
            () => { tasks.monthly.splice(idx, 1); saveTasks(); renderMonthlyEditor(); },
            "Текст задачи"
          );
          editorMonthlyEl.appendChild(row);
        });
      }

      addMonthlyBtn.addEventListener("click", () => {
        tasks.monthly.push("");
        saveTasks();
        renderMonthlyEditor();
        const inputs = editorMonthlyEl.querySelectorAll(".text-input");
        if (inputs.length) inputs[inputs.length - 1].focus();
      });

      resetBtn.addEventListener("click", () => {
        if (!confirm("Сбросить список задач к стандартному? Прогресс выполненных задач не очистится.")) return;
        clearCustomTasks();
        tasks = defaultTasks();
        renderEditor();
        renderDays();
        renderTasks();
        renderMonthly();
      });

      // === Переключение вкладок ===
      const tabBtns = document.querySelectorAll(".tab-btn");
      tabBtns.forEach((btn) => {
        btn.addEventListener("click", () => {
          const view = btn.dataset.view;
          tabBtns.forEach((b) => b.classList.toggle("active", b.dataset.view === view));
          document.getElementById("view-cleaning").classList.toggle("hidden", view !== "cleaning");
          document.getElementById("view-editor").classList.toggle("hidden", view !== "editor");
          if (view === "cleaning") {
            renderDays();
            renderTasks();
            renderMonthly();
          }
        });
      });

      // --- Старт ---
      renderDays();
      renderTasks();
      renderMonthly();
      renderEditor();
    })();
  </script>
</body>
</html>
